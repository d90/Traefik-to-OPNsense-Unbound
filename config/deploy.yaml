---
apiVersion: v1
kind: Namespace
metadata:
  name: traefik-unbound
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik-unbound
  namespace: traefik-unbound
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-unbound
rules:
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-unbound
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-unbound
subjects:
  - kind: ServiceAccount
    name: traefik-unbound
    namespace: traefik-unbound
---
# Create this secret with your actual credentials before deploying:
#   kubectl -n traefik-unbound create secret generic opnsense-creds \
#     --from-literal=api-key=YOUR_KEY \
#     --from-literal=api-secret=YOUR_SECRET
apiVersion: v1
kind: Secret
metadata:
  name: opnsense-creds
  namespace: traefik-unbound
type: Opaque
stringData:
  api-key: "REPLACE_ME"
  api-secret: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-unbound
  namespace: traefik-unbound
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik-unbound
  template:
    metadata:
      labels:
        app: traefik-unbound
    spec:
      serviceAccountName: traefik-unbound
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: manager
          image: ghcr.io/d90/traefik-to-opnsense-unbound:latest
          env:
            - name: OPNSENSE_URL
              value: "https://10.10.10.1"  # replace with your OPNsense address
            - name: TARGET_IP
              value: "10.10.100.101"        # replace with your Traefik LB VIP
            - name: TLS_SKIP_VERIFY
              value: "false"
            - name: OPNSENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opnsense-creds
                  key: api-key
            - name: OPNSENSE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: opnsense-creds
                  key: api-secret
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
