---
apiVersion: v1
kind: Namespace
metadata:
  name: talos-dns-opnsense
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: talos-dns-opnsense
  namespace: talos-dns-opnsense
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: talos-dns-opnsense
rules:
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: talos-dns-opnsense
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: talos-dns-opnsense
subjects:
  - kind: ServiceAccount
    name: talos-dns-opnsense
    namespace: talos-dns-opnsense
---
# Create this secret with your actual credentials before deploying:
#   kubectl -n talos-dns-opnsense create secret generic opnsense-creds \
#     --from-literal=api-key=YOUR_KEY \
#     --from-literal=api-secret=YOUR_SECRET
apiVersion: v1
kind: Secret
metadata:
  name: opnsense-creds
  namespace: talos-dns-opnsense
type: Opaque
stringData:
  api-key: "REPLACE_ME"
  api-secret: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talos-dns-opnsense
  namespace: talos-dns-opnsense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talos-dns-opnsense
  template:
    metadata:
      labels:
        app: talos-dns-opnsense
    spec:
      serviceAccountName: talos-dns-opnsense
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: manager
          image: ghcr.io/d90/talos-dns-opnsense:latest
          env:
            - name: OPNSENSE_URL
              value: "https://192.168.1.1"  # replace with your OPNsense address
            - name: TARGET_IP
              value: "192.168.1.100"        # replace with your Traefik LB VIP
            - name: TLS_SKIP_VERIFY
              value: "false"
            - name: OPNSENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opnsense-creds
                  key: api-key
            - name: OPNSENSE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: opnsense-creds
                  key: api-secret
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
